# Unified app: Hermes Agent (brain) + AIRI (face)
#
# - hermes: NousResearch/hermes-agent gateway with its built-in
#   OpenAI-compatible API server enabled (/v1/chat/completions, port 8642).
# - airi:   moeru-ai/airi "stage-web" frontend (VRM/Live2D avatar, ASR/TTS),
#   built from source and served as a static SPA by nginx.
#
# AIRI runs entirely in the browser and calls Hermes directly, so the
# Hermes API server must allow the AIRI origin via CORS
# (API_SERVER_CORS_ORIGINS below).
#
# Usage:
#   ./scripts/setup.sh        # one-time: submodules, .env, first-run config
#   docker compose up -d --build
#
# Then open http://localhost:6620 and add Hermes as a custom
# OpenAI-compatible provider in AIRI's settings (see README.md).

services:
  hermes:
    build:
      context: ./vendor/hermes-agent
    image: unified-hermes-agent
    container_name: unified-hermes
    restart: unless-stopped
    command: ["gateway", "run"]
    ports:
      # Bound to loopback: the browser running AIRI talks to Hermes via
      # localhost. Change to "8642:8642" only if you understand the risk —
      # the API server exposes the agent's full toolset, including a terminal.
      - "127.0.0.1:${HERMES_PORT:-8642}:8642"
    volumes:
      # Hermes state (config.yaml, .env, sessions, memory, skills).
      # Equivalent to ~/.hermes when running Hermes natively.
      - ./data/hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # --- OpenAI-compatible API server (the bridge to AIRI) ---
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0 # inside the container; published on loopback above
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:?Set API_SERVER_KEY in .env (see .env.example)}
      # AIRI is a browser app calling Hermes directly, so its origin must be
      # allowlisted for CORS (comma-separated).
      - API_SERVER_CORS_ORIGINS=${API_SERVER_CORS_ORIGINS:-http://localhost:6620,http://127.0.0.1:6620}
      - API_SERVER_MODEL_NAME=${API_SERVER_MODEL_NAME:-hermes-agent}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8642/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  airi:
    build:
      context: ./vendor/airi
      dockerfile: apps/stage-web/Dockerfile
      args:
        VITE_ENABLE_POSTHOG: "false"
    image: unified-airi-stage-web
    container_name: unified-airi
    restart: unless-stopped
    depends_on:
      - hermes
    ports:
      - "127.0.0.1:${AIRI_PORT:-6620}:80"
